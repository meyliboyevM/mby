<div class="w-[330px] text-secondary border">
  <img src="imgs/pr-images/p-1.jpg">
  <p class="px-1 p-1 font-mono border-b">{{data.stack}}</p>
  <div class="px-4">
    <h6 class="my-3 font-medium text-white">{{data.title}}</h6>
    <p> {{data.description}} </p>
    <div>
      <button *ngIf="data?.buttons[0]" class="my-2 me-6 px-4 py-1 cursor-pointer text-white border border-primary">{{data?.buttons[0]}}</button>
      <button *ngIf="data?.buttons[1]" class="my-2 px-4 py-1 cursor-pointer text-secondary border">{{data?.buttons[1]}}</button>
    </div>
  </div>
</div>
